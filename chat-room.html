<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat - WarisanKating</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="app-shell">
    <header class="navbar">
      <div class="navbar-inner">
        <a class="brand" href="home.html">
          <img class="brand-logo" src="images/Logo.svg" alt="WarisanKating" />
        </a>
        <div class="nav-search">
          <input type="text" placeholder="Cari buku, alat, jas lab..." />
          <img class="search-icon" src="images/Search.svg" alt="Cari" />
        </div>
        <div class="nav-actions">
          <span class="nav-icon">
            <img src="images/Notifikasi.svg" alt="Notifikasi" />
          </span>
          <a class="nav-avatar" href="profile.html">
            <img src="images/Prabu.png" alt="Foto Profil" />
          </a>
        </div>
      </div>
    </header>

    <nav class="top-icons">
      <div class="top-icons-inner">
        <a class="top-link" href="home.html">
          <img src="images/Home.svg" alt="Beranda" />
        </a>
        <a class="top-link" href="sewa.html">
          <img src="images/Pesanan.svg" alt="Sewa" />
        </a>
        <a class="top-link is-active" href="chat-list.html">
          <img src="images/Chat.svg" alt="Chat" />
        </a>
      </div>
    </nav>

    <main class="page-content">
      <a class="back-link" href="chat-list.html">&larr; Kembali</a>

      <section class="chat-layout">
        <div class="chat-header">
          <div class="avatar">
            <img id="chat-avatar" src="images/ProfileReva.png" alt="Repuy" />
          </div>
          <div>
            <div class="item-name" id="chat-name">Repuy</div>
            <div class="list-meta"><span class="status-dot"></span>Online</div>
          </div>
          <div class="chat-topic" id="chat-topic">Jas Lab Ukuran M</div>
        </div>

        <div class="chat-window">
          <div class="bubble outgoing" id="chat-outgoing">
            Halo kak, jas lab ukuran M masih tersedia?
            <span class="bubble-meta">12:00</span>
          </div>
          <div class="bubble incoming" id="chat-incoming">
            Masih ada. Perlu dipakai kapan?
            <span class="bubble-meta">12:00</span>
          </div>
          <div class="quick-reply" id="chat-quick">Boleh COD besok?</div>
        </div>

        <div class="chat-input">
          <button class="icon-btn" type="button">COD</button>
          <input type="text" placeholder="Ketik pesan..." />
          <button class="send-btn" type="button">&gt;</button>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
