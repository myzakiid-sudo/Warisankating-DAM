<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Chat - WarisanKating</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="app-shell">
    <header class="navbar">
      <div class="navbar-inner">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="images/Logo.svg" alt="WarisanKating" />
        </a>
        <div class="nav-search">
          <input type="text" placeholder="Cari buku, alat, jas lab..." />
          <span>Q</span>
        </div>
        <div class="nav-actions">
          <span class="nav-icon">
            <img src="images/Notifikasi.svg" alt="Notifikasi" />
          </span>
          <a class="nav-avatar" href="profile.html">
            <img src="images/Prabu.png" alt="Foto Profil" />
          </a>
        </div>
      </div>
    </header>

    <nav class="top-icons">
      <div class="top-icons-inner">
        <a class="top-link" href="index.html">
          <img src="images/Home.svg" alt="Beranda" />
        </a>
        <a class="top-link" href="sewa.html">
          <img src="images/Pesanan.svg" alt="Sewa" />
        </a>
        <a class="top-link is-active" href="chat-list.html">
          <img src="images/Chat.svg" alt="Chat" />
        </a>
      </div>
    </nav>

    <main class="page-content">
      <div class="section-title">Daftar Chat</div>
      <section class="list-card">
        <a class="list-item" href="chat-room.html?user=zaki">
          <div class="avatar">
            <img src="images/ProfileZaki.png" alt="Muhamad Yusuf Zaki" />
          </div>
          <div>
            <div class="item-name">Muhamad Yusuf Zaki</div>
            <div class="list-meta"><span class="status-dot"></span>Online</div>
          </div>
          <div class="list-meta">12:12</div>
        </a>
        <a class="list-item" href="chat-room.html?user=brian">
          <div class="avatar">
            <img src="images/ProfileBrian.png" alt="Briankung" />
          </div>
          <div>
            <div class="item-name">Briankung</div>
            <div class="list-meta"><span class="status-dot"></span>Online</div>
          </div>
          <div class="list-meta">11:50</div>
        </a>
        <a class="list-item" href="chat-room.html?user=fariz">
          <div class="avatar">
            <img src="images/ProfileFariz.png" alt="Bli Fariz" />
          </div>
          <div>
            <div class="item-name">Bli Fariz</div>
            <div class="list-meta"><span class="status-dot"></span>Online</div>
          </div>
          <div class="list-meta">10:35</div>
        </a>
        <a class="list-item" href="chat-room.html?user=reva">
          <div class="avatar">
            <img src="images/ProfileReva.png" alt="Repuy" />
          </div>
          <div>
            <div class="item-name">Repuy</div>
            <div class="list-meta"><span class="status-dot"></span>Online</div>
          </div>
          <div class="list-meta">09:40</div>
        </a>
        <a class="list-item" href="chat-room.html?user=nayaka">
          <div class="avatar">
            <img src="images/ProfileNayaka.png" alt="Nayaka Neobeast" />
          </div>
          <div>
            <div class="item-name">Nayaka Neobeast</div>
            <div class="list-meta"><span class="status-dot"></span>Online</div>
          </div>
          <div class="list-meta">11:50</div>
        </a>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
