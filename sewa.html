<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keranjang Sewa - WarisanKating</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="app-shell">
    <header class="navbar">
      <div class="navbar-inner">
        <a class="brand" href="home.html">
          <img class="brand-logo" src="images/Logo.svg" alt="WarisanKating" />
        </a>
        <div class="nav-search">
          <input type="text" placeholder="Cari buku, alat, jas lab..." />
          <img class="search-icon" src="images/Search.svg" alt="Cari" />
        </div>
        <div class="nav-actions">
          <span class="nav-icon">
            <img src="images/Notifikasi.svg" alt="Notifikasi" />
          </span>
          <a class="nav-avatar" href="profile.html">
            <img src="images/Prabu.png" alt="Foto Profil" />
          </a>
        </div>
      </div>
    </header>

    <nav class="top-icons">
      <div class="top-icons-inner">
        <a class="top-link" href="home.html">
          <img src="images/Home.svg" alt="Beranda" />
        </a>
        <a class="top-link is-active" href="sewa.html">
          <img src="images/Pesanan.svg" alt="Sewa" />
        </a>
        <a class="top-link" href="chat-list.html">
          <img src="images/Chat.svg" alt="Chat" />
        </a>
      </div>
    </nav>

    <main class="page-content">
      <a class="back-link" href="home.html">&larr; Kembali</a>

      <div class="section-title">Dashboard Sewa Aktif</div>

      <section class="rental-card">
        <div class="rental-thumb">
          <img src="images/jas%20lab.png" alt="Jas Lab" />
        </div>
        <div class="rental-info">
          <div class="item-name">Jas Lab Ukuran M (Unisex)</div>
          <div class="item-meta">dari Sari Dewi</div>
          <div class="rental-dates">
            <div>
              <strong>Mulai</strong><br />
              01-06-2025
            </div>
            <div>
              <strong>Selesai</strong><br />
              08-06-2025
            </div>
          </div>
          <span class="rental-alert">Hampir berakhir - 2 hari lagi!</span>
          <div class="item-progress"><span style="width: 90%"></span></div>
        </div>
      </section>

      <section class="rental-card">
        <div class="rental-thumb">
          <img src="images/buku%20ql.png" alt="Buku SQL" />
        </div>
        <div class="rental-info">
          <div class="item-name">Buku Pemrograman SQL</div>
          <div class="item-meta">dari Prabu Rasyansyah</div>
          <div class="rental-dates">
            <div>
              <strong>Mulai</strong><br />
              03-06-2025
            </div>
            <div>
              <strong>Selesai</strong><br />
              10-06-2025
            </div>
          </div>
          <span class="rental-alert good">Berjalan - 5 hari lagi!</span>
          <div class="item-progress"><span style="width: 70%"></span></div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
