<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Produk - WarisanKating</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="app-shell">
    <header class="navbar">
      <div class="navbar-inner">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="images/Logo.svg" alt="WarisanKating" />
        </a>
        <div class="nav-search">
          <input type="text" placeholder="Cari buku, alat, jas lab..." />
          <span>Q</span>
        </div>
        <div class="nav-actions">
          <span class="nav-icon">
            <img src="images/Notifikasi.svg" alt="Notifikasi" />
          </span>
          <a class="nav-avatar" href="profile.html">
            <img src="images/Prabu.png" alt="Foto Profil" />
          </a>
        </div>
      </div>
    </header>

    <nav class="top-icons">
      <div class="top-icons-inner">
        <a class="top-link" href="index.html">
          <img src="images/Home.svg" alt="Beranda" />
        </a>
        <a class="top-link" href="sewa.html">
          <img src="images/Pesanan.svg" alt="Sewa" />
        </a>
        <a class="top-link" href="chat-list.html">
          <img src="images/Chat.svg" alt="Chat" />
        </a>
      </div>
    </nav>

    <main class="page-content">
      <a class="back-link" href="index.html">&larr; Kembali</a>

      <section class="detail-layout">
        <div class="media-card">
          <div class="tag" id="detail-tag">Untuk Dijual</div>
          <div class="media-main">
            <img
              id="detail-main"
              src="images/buku%20ql.png"
              alt="Buku Pemrograman SQL"
            />
          </div>
          <div class="media-thumbs is-two" id="detail-thumbs">
            <div class="thumb">
              <img src="images/buku%20ql.png" alt="Detail Buku SQL" />
            </div>
            <div class="thumb">
              <img src="images/buku%20ql.png" alt="Buku SQL" />
            </div>
          </div>
        </div>

        <div class="detail-card">
          <div>
            <div class="detail-title" id="detail-title">
              Buku Pemrograman SQL
            </div>
            <div class="detail-price" id="detail-price">Rp 100.000</div>
          </div>

          <div class="progress-row">
            <div class="item-meta">Kondisi Barang</div>
            <div class="item-progress">
              <span id="detail-progress" style="width: 85%"></span>
            </div>
            <div class="item-meta" id="detail-condition">
              85% - Kondisi sangat baik
            </div>
          </div>

          <div>
            <div
              class="item-meta"
              style="text-transform: uppercase; letter-spacing: 0.08em"
            >
              Profil Penjual
            </div>
            <div class="profile-card">
              <div class="avatar">PG</div>
              <div>
                <div class="item-name">Prabu Ganteng</div>
                <div class="item-meta">Sistem Informasi - Angkatan 2023</div>
                <div class="tag">Mahasiswa Terverifikasi</div>
              </div>
            </div>
          </div>

          <div class="action-row">
            <a class="primary-btn" href="chat-room.html">Chat Penjual</a>
            <button class="outline-btn" type="button">&#9825;</button>
          </div>

          <div class="note">
            Transaksi COD di Kampus - Sepakati titik temu melalui chat. Tanpa
            kurir, tanpa ongkir.
          </div>
        </div>
      </section>

      <section class="recommendations">
        <div class="section-title with-icon">
          <img src="images/rekomendasi.svg" alt="Rekomendasi" />
          <span>Rekomendasi</span>
        </div>
        <div class="item-grid" id="recommendations-grid"></div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
