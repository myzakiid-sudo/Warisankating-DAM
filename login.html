<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - WarisanKating</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="login-left">
          <div>
            <h1 class="login-title">Login</h1>
            <p class="login-subtitle">Preloved barang dari kating tercinta</p>
          </div>

          <a class="social-btn" href="#">
            <img src="images/Google.svg" alt="Google" />
            <span>Continue with Google</span>
          </a>

          <div class="social-row">
            <a class="social-icon" href="index.html">
              <img src="images/Facebook.svg" alt="Facebook" />
            </a>
            <a class="social-icon" href="#">
              <img src="images/Discord.svg" alt="Discord" />
            </a>
            <a class="social-icon" href="#">
              <img src="images/Reddit.svg" alt="Reddit" />
            </a>
          </div>

          <div class="divider"></div>

          <div class="field">
            <label for="email">Email or Phone</label>
            <input
              id="email"
              type="text"
              placeholder="Eg. 1234567/abc@example.com"
            />
          </div>

          <a class="primary-btn" href="index.html"
            >Continue with Email or Phone</a
          >
        </div>

        <aside class="side-panel">
          <img class="logo-full" src="images/Logo.svg" alt="WarisanKating" />
        </aside>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
