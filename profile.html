<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil - WarisanKating</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="app-shell">
    <header class="navbar">
      <div class="navbar-inner">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="images/Logo.svg" alt="WarisanKating" />
        </a>
        <div class="nav-search">
          <input type="text" placeholder="Cari buku, alat, jas lab..." />
          <span>Q</span>
        </div>
        <div class="nav-actions">
          <span class="nav-icon">
            <img src="images/Notifikasi.svg" alt="Notifikasi" />
          </span>
          <a class="nav-avatar" href="profile.html">
            <img src="images/Prabu.png" alt="Foto Profil" />
          </a>
        </div>
      </div>
    </header>

    <nav class="top-icons">
      <div class="top-icons-inner">
        <a class="top-link" href="index.html">
          <img src="images/Home.svg" alt="Beranda" />
        </a>
        <a class="top-link" href="sewa.html">
          <img src="images/Pesanan.svg" alt="Sewa" />
        </a>
        <a class="top-link" href="chat-list.html">
          <img src="images/Chat.svg" alt="Chat" />
        </a>
      </div>
    </nav>

    <main class="page-content">
      <a class="back-link" href="index.html">&larr; Kembali</a>

      <section class="profile-hero">
        <div class="profile-avatar">
          <img src="images/Prabu.png" alt="Prabu" />
        </div>
        <div class="profile-name">Prabu Ganteng</div>
        <div class="profile-subtitle">
          Sistem Informasi - Angkatan 2023 - FILKOM
        </div>
        <div class="profile-badge">Mahasiswa Terverifikasi</div>
        <div class="profile-stats">
          <div class="stat">
            <strong>12</strong>
            <span>Terjual</span>
          </div>
          <div class="stat">
            <strong>4.9</strong>
            <span>Rating</span>
          </div>
          <div class="stat">
            <strong>3</strong>
            <span>Etalase</span>
          </div>
        </div>
      </section>

      <section class="profile-tabs">
        <div class="tab-btn is-active">Barang Dijual</div>
        <div class="tab-btn">Barang Disewakan</div>
      </section>

      <section class="item-grid">
        <a class="item-card" href="detail.html?item=laptop">
          <div class="item-image">
            <img src="images/Laptop.png" alt="Laptop" />
          </div>
          <div class="item-body">
            <div class="item-tag">
              <img src="images/sewa.svg" alt="Sewa" />
              <span>Sewa</span>
            </div>
            <div class="item-name">Laptop</div>
            <div class="item-price">Rp 100.000/hari</div>
            <div class="item-row">
              <div class="item-location">
                <img src="images/lokasi.svg" alt="Lokasi" />
                <span>FILKOM</span>
              </div>
              <div class="item-rating">90%</div>
            </div>
            <div class="item-progress"><span style="width: 90%"></span></div>
          </div>
        </a>
        <a class="item-card" href="detail.html?item=kalkulator">
          <div class="item-image">
            <img src="images/ProdukKalkulator.png" alt="Kalkulator" />
          </div>
          <div class="item-body">
            <div class="item-tag">
              <img src="images/jual.svg" alt="Jual" />
              <span>Jual</span>
            </div>
            <div class="item-name">Kalkulator Scientific</div>
            <div class="item-price">Rp 45.000</div>
            <div class="item-row">
              <div class="item-location">
                <img src="images/lokasi.svg" alt="Lokasi" />
                <span>FILKOM</span>
              </div>
              <div class="item-rating">95%</div>
            </div>
            <div class="item-progress"><span style="width: 95%"></span></div>
          </div>
        </a>
        <a class="item-card" href="detail.html?item=mouse">
          <div class="item-image">
            <img src="images/tikus.png" alt="Mouse" />
          </div>
          <div class="item-body">
            <div class="item-tag">
              <img src="images/jual.svg" alt="Jual" />
              <span>Jual</span>
            </div>
            <div class="item-name">Mouse</div>
            <div class="item-price">Rp 30.000</div>
            <div class="item-row">
              <div class="item-location">
                <img src="images/lokasi.svg" alt="Lokasi" />
                <span>FILKOM</span>
              </div>
              <div class="item-rating">80%</div>
            </div>
            <div class="item-progress"><span style="width: 80%"></span></div>
          </div>
        </a>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
